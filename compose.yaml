services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --ui-port
      - "8233"
    ports:
      - "7233:7233"  # workers & clients
      - "8233:8233"  # http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3,dynamodb
      DEFAULT_REGION: eu-west-3
      AWS_DEFAULT_REGION: eu-west-3
    ports:
      - "4566:4566"  # AWS endpoint
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  init:
    image: amazon/aws-cli:latest
    env_file: .env
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      : "$${IMAGES_BUCKET:?IMAGES_BUCKET must be set in .env}"
      : "$${IMAGES_TABLE:?IMAGES_TABLE must be set in .env}"
      aws --endpoint-url=http://localstack:4566 s3 mb s3://$$IMAGES_BUCKET || true
      aws --endpoint-url=http://localstack:4566 dynamodb create-table \
        --table-name $$IMAGES_TABLE \
        --attribute-definitions AttributeName=sessionId,AttributeType=S AttributeName=imageId,AttributeType=S \
        --key-schema AttributeName=sessionId,KeyType=HASH AttributeName=imageId,KeyType=RANGE \
        --billing-mode PAY_PER_REQUEST || true
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      temporal:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file: .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      AWS_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"  # HTTP API
    depends_on:
      temporal:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"  # Nuxt
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
