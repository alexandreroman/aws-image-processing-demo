# Local-only dev stack. Self-contained: Temporal dev server, Moto, worker,
# backend, frontend. Stack-internal constants live in each service's
# `environment:` block — compose does NOT read `.env` via `env_file:`.
# Only `ANTHROPIC_API_KEY` is interpolated from `.env` at compose-time
# (since compose auto-loads `.env` for ${VAR} substitution).

services:
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
    ports:
      - "7233:7233"  # workers & clients
      - "8233:8233"  # http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  moto:
    # `motoserver/moto` is a free, community AWS emulator.
    # Listens on port 5000 internally; we expose it as 4566 externally
    # so AWS_ENDPOINT_URL=http://localhost:4566 in .env continues to work.
    image: motoserver/moto:latest
    command: ["-H", "0.0.0.0"]
    environment:
      MOTO_ALLOW_NONEXISTENT_REGION: "true"
    ports:
      - "4566:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/moto-api/\").read()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  init:
    image: amazon/aws-cli:latest
    environment:
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      IMAGES_BUCKET: aws-image-processing-demo-images-local
      IMAGES_TABLE: aws-image-processing-demo-images-local
    volumes:
      - ./frontend/public/sample-images:/samples:ro
    depends_on:
      moto:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    # Single-element array form of `command:` prevents docker-compose v5
    # from word-splitting the block scalar across whitespace/newlines.
    # The block scalar is passed as one argv to `/bin/sh -c`.
    # `$$VAR` escapes compose's parse-time interpolation so the literal
    # `$VAR` reaches the container shell, which resolves it against the
    # `environment:` block above.
    command:
      - |
        set -eux
        : "$${IMAGES_BUCKET:?IMAGES_BUCKET must be set}"
        : "$${IMAGES_TABLE:?IMAGES_TABLE must be set}"

        if ! aws --endpoint-url=http://moto:5000 s3api head-bucket \
          --bucket "$$IMAGES_BUCKET" 2>/dev/null; then
          aws --endpoint-url=http://moto:5000 s3 mb "s3://$$IMAGES_BUCKET"
        fi

        # Dev-only: moto refuses anonymous GETs without a bucket policy; the
        # frontend fetches images directly from this S3 endpoint, so allow
        # public read. Production uses CloudFront + OAC and keeps the bucket
        # fully private (see infra/storage.tf).
        aws --endpoint-url=http://moto:5000 s3api put-bucket-policy \
          --bucket "$$IMAGES_BUCKET" \
          --policy "{
            \"Version\": \"2012-10-17\",
            \"Statement\": [{
              \"Sid\": \"PublicReadLocalDev\",
              \"Effect\": \"Allow\",
              \"Principal\": \"*\",
              \"Action\": \"s3:GetObject\",
              \"Resource\": \"arn:aws:s3:::$${IMAGES_BUCKET}/*\"
            }]
          }"

        if ! aws --endpoint-url=http://moto:5000 dynamodb describe-table \
          --table-name "$$IMAGES_TABLE" >/dev/null 2>&1; then
          aws --endpoint-url=http://moto:5000 dynamodb create-table \
            --table-name "$$IMAGES_TABLE" \
            --attribute-definitions \
              AttributeName=pipelineId,AttributeType=S \
              AttributeName=imageId,AttributeType=S \
            --key-schema \
              AttributeName=pipelineId,KeyType=HASH \
              AttributeName=imageId,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST
        fi

        aws --endpoint-url=http://moto:5000 s3 sync /samples "s3://$$IMAGES_BUCKET/samples/" \
          --exclude '*.md' --exclude '.*' --content-type image/jpeg
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      # Local dev runs a single worker on a single legacy queue. The
      # ECS / Lambda runtime split exists only on a real AWS deploy
      # where Tofu provisions two workers and the backend Lambda gets
      # WORKER_TASK_QUEUE_ECS / WORKER_TASK_QUEUE_LAMBDA set.
      TEMPORAL_TASK_QUEUE: image-processing
      AWS_ENDPOINT_URL: http://moto:5000
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      IMAGES_BUCKET: aws-image-processing-demo-images-local
      IMAGES_TABLE: aws-image-processing-demo-images-local
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in .env or shell}
    # The worker image is distroless static; the Dockerfile bakes in a
    # static wget binary from busybox specifically for this probe.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      temporal:
        condition: service_healthy
      moto:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      # Single legacy queue in local dev — the runtime selector is hidden
      # in the UI because WORKER_TASK_QUEUE_ECS / _LAMBDA are unset.
      TEMPORAL_TASK_QUEUE: image-processing
      AWS_ENDPOINT_URL: http://moto:5000
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      IMAGES_BUCKET: aws-image-processing-demo-images-local
      IMAGES_TABLE: aws-image-processing-demo-images-local
    ports:
      - "8000:8000"  # HTTP API
    # The backend image is distroless static; the Dockerfile bakes in a
    # static wget binary from busybox specifically for this probe.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      temporal:
        condition: service_healthy
      moto:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  frontend:
    # Caddy serves the Nuxt SSG bundle on :3000 and reverse-proxies
    # /api/* to backend:8000 — same-origin browser-side, mirroring the
    # prod CloudFront topology (CloudFront → S3 + API Gateway).
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
