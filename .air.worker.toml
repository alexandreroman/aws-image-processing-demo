root = "."
tmp_dir = "tmp/worker"

[build]
  cmd = "go build -o ./tmp/worker/server ./cmd/worker"
  entrypoint = ["./tmp/worker/server"]
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "frontend", "infra", "scripts", "dist", ".git", ".claude"]
  kill_delay = "5s"
  send_interrupt = true
  stop_on_error = true
  log = "build-errors.log"

[misc]
  clean_on_exit = true

[log]
  time = false
