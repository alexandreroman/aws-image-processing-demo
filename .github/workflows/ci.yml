name: CI

# Builds and tests the project, then publishes the
# multi-arch worker and backend images to GitHub
# Container Registry (GHCR) on pushes to `main`
# and manual dispatch.
#
# Two packages are published, one per Dockerfile
# stage:
#   - aws-image-processing-demo-worker
#   - aws-image-processing-demo-backend
#
# Multi-arch images are built on native runners
# (no QEMU): `ubuntu-24.04` for linux/amd64 and
# `ubuntu-24.04-arm` for linux/arm64. Each native
# build pushes an intermediate per-arch tag
# (`linux-amd64` and `linux-arm64`); a final
# `package-image` job merges those tags into the
# `:latest` multi-arch manifest with
# `docker buildx imagetools create`.
#
# GHCR packages default to private. To allow
# unauthenticated pulls, set each package's
# visibility to "Public" once in:
#   Settings → Packages → <package-name>
#   → Change visibility → Public.
# Visibility cannot be set via GITHUB_TOKEN.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet + build + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend (lint + generate)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate static site
        run: pnpm generate

  build-image:
    name: Build ${{ matrix.target }} (${{ matrix.arch }})
    needs: [go, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [worker, backend]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }} image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/aws-image-processing-demo-${{ matrix.target }}:linux-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.arch }}
          provenance: true
          sbom: true

  package-image:
    name: Package multi-arch ${{ matrix.target }}
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [worker, backend]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/aws-image-processing-demo-${{ matrix.target }}
          docker buildx imagetools create -t "$IMAGE:latest" \
            "$IMAGE:linux-amd64" \
            "$IMAGE:linux-arm64"
