name: Deploy frontend

# Builds the Nuxt SSG output and deploys it to
# S3 + CloudFront on every push to main that
# touches frontend/.
#
# Uses GitHub OIDC to assume an AWS IAM role —
# no long-lived access keys.
#
# Required repository secrets:
#   AWS_DEPLOY_ROLE_ARN
#   AWS_REGION
#   AWS_FRONTEND_BUCKET
#   AWS_CLOUDFRONT_DISTRIBUTION_ID
#
# TODO: in a future iteration, fetch the bucket
# name and distribution ID from the Tofu remote
# state instead of repo secrets, so a single
# source of truth (Tofu) drives both deploy paths.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Generate static site
        run: pnpm -C frontend generate

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: github-frontend-deploy

      - name: Sync to S3
        run: |
          aws s3 sync frontend/.output/public/ \
            "s3://${{ secrets.AWS_FRONTEND_BUCKET }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*' >/dev/null
