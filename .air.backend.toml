root = "."
tmp_dir = "tmp/backend"

[build]
  cmd = "go build -o ./tmp/backend/server ./cmd/backend"
  entrypoint = ["./tmp/backend/server"]
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "frontend", "infra", "console", "worker", "scripts", ".git", ".claude"]
  kill_delay = "5s"
  send_interrupt = true
  stop_on_error = true
  log = "build-errors.log"

[misc]
  clean_on_exit = true

[log]
  time = false
